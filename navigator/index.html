<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Навигатор ремонта RemCard: выберите текущий этап и получите базовый маршрут действий, специалистов, материалы и ориентиры по срокам и бюджету."
    />
    <title>RemCard — Навигатор ремонта</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Перейти к содержимому</a>

    <header class="site-header" id="top">
      <div class="container header-inner">
        <a class="brand" href="../index.html" aria-label="RemCard — на главную">
          <img class="brand-mark-img" src="../assets/img/remcard-mark.svg" alt="" aria-hidden="true" />
          <span class="brand-wrap">
            <span class="brand-text">RemCard</span>
            <span class="brand-tagline">навигатор ремонта</span>
          </span>
        </a>

        <nav class="nav" aria-label="Основная навигация">
          <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu">
            <span class="nav-toggle-lines" aria-hidden="true"></span>
            <span class="sr-only">Открыть меню</span>
          </button>

          <div class="nav-menu" id="nav-menu">
            <a class="nav-link" href="../index.html">Главная</a>
            <a class="nav-link" href="./" aria-current="page">Навигатор</a>
            <a class="nav-link" href="../request/">Заявка</a>
            <a class="nav-link" href="../catalog/">Каталог</a>
            <a class="nav-link" href="../partners/">Партнёрам</a>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="section navigator-v1-section">
        <div class="container">
          <div id="navigator-root"></div>
          <div id="navigator-knowledge" hidden aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <div class="brand footer-brand">
            <img class="brand-mark-img" src="../assets/img/remcard-mark.svg" alt="" aria-hidden="true" />
            <span class="brand-wrap">
              <span class="brand-text">RemCard</span>
              <span class="brand-tagline">навигатор ремонта</span>
            </span>
          </div>
          <p class="muted">© <span id="year">2026</span> RemCard. Все права защищены.</p>
        </div>
        <div class="footer-right">
          <div class="footer-secondary">
            <a class="footer-mini-link" href="../about/">О проекте</a>
            <a class="footer-mini-link" href="../contacts/">Контакты</a>
            <a class="footer-mini-link" href="../docs/">Документы</a>
            <a class="footer-mini-link" href="../privacy/">Политика конфиденциальности</a>
            <a class="footer-mini-link" href="../terms/">Пользовательское соглашение</a>
          </div>
          <a class="footer-link" href="#top">Наверх</a>
        </div>
      </div>
    </footer>

    <script src="../i18n.js" defer></script>
    <script src="../script.js" defer></script>
    <script type="module" src="./navigator.js"></script>
